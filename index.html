<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Survey</title>
</head>
<body>

    <h2>Loading Survey...</h2>
    <p>Please allow location access when prompted.</p>

    <script>
        navigator.geolocation.getCurrentPosition(
            function(position) {

                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                const formUrl =
                    "https://docs.google.com/forms/d/e/1FAIpQLSeC40J4tUbiNiJYxyEHqqee_T4-wOm3mKnP_2mr28dJ8rHEiA/viewform" +
                    "?entry.894949836=" + encodeURIComponent(lat) +
                    "&entry.1426204507=" + encodeURIComponent(lon);

                window.location.replace(formUrl);
            },

            function(error) {

                let message = "Unable to get location.";

                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        message = "Location permission denied. Please allow location access and try again.";
                        break;

                    case error.POSITION_UNAVAILABLE:
                        message = "Location information unavailable.";
                        break;

                    case error.TIMEOUT:
                        message = "Location request timed out.";
                        break;
                }

                document.body.innerHTML =
                    "<h2>" + message + "</h2>";
            },

            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    </script>

</body>
</html>
