<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Survey</title>
</head>

<body>

<h2>Loading Survey...</h2>
<p>Please allow location access...</p>

<script>

if (!navigator.geolocation) {
    alert("Your browser does not support location.");
}
else {

    navigator.geolocation.getCurrentPosition(

        function(position) {

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            const url =
            "https://docs.google.com/forms/d/e/1FAIpQLSeC40J4tUbiNiJYxyEHqqee_T4-wOm3mKnP_2mr28dJ8rHEiA/viewform" +
            "?usp=pp_url" +
            "&entry.907346979=" + encodeURIComponent(latitude) +
            "&entry.692264413=" + encodeURIComponent(longitude);

            window.location.replace(url);

        },

        function(error) {

            alert(
                "Location permission is required.\n\nPlease press Allow when Safari asks for your location."
            );

        },

        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }

    );

}

</script>

</body>
</html>
