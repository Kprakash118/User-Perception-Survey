<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Survey</title>
</head>
<body>

<h2>Loading Survey...</h2>
<p>Please allow location access.</p>

<script>

navigator.geolocation.getCurrentPosition(

function(position) {

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    const formUrl =
    "https://docs.google.com/forms/d/e/1FAIpQLSeC40J4tUbiNiJYxyEHqqee_T4-wOm3mKnP_2mr28dJ8rHEiA/viewform" +
    "?entry.907346979=" + encodeURIComponent(lat) +
    "&entry.692264413=" + encodeURIComponent(lon);

    window.location.href = formUrl;
},

function(error) {

    alert(
        "Location access is required to continue.\n\n" +
        "Please allow location permission and refresh the page."
    );

});

</script>

</body>
</html>
